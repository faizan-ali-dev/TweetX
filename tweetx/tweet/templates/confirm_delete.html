{% extends "layout.html" %} 
{% block title %} Delete Tweet - TweetX {% endblock %}

{% block content %}
<div class="center-delete-container">
  <i class="fa-regular fa-circle-xmark" style="font-size: 48px; color: var(--danger); margin-bottom: 20px;"></i>
  <h2>Delete this tweet?</h2>
  <p style="color: var(--text-secondary); margin-bottom: 24px; font-size: 14px;">This action cannot be undone.</p>
  <form method="post" class="d-flex gap-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'home' %}" class="btn btn-success">Cancel</a>
  </form>
</div>
{% endblock %}
