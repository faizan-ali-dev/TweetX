{% extends "layout.html" %}
{% load static %}

{% block sidebar %}{% endblock %}
{% block menu-button %} {% endblock %}

{% block content %}
<div class="auth-container">
  <div class="styled-auth-form" style="text-align:center;">
    <div style="margin-bottom: 8px;">
      <img src="{% static 'media/logo.png' %}" alt="TweetX" style="height: 72px; margin-bottom: 16px;">
      <h2 style="margin-bottom: 8px; font-size: 22px;">Reset your password</h2>
      <p style="color: var(--text-secondary); font-size: 14px; margin: 0;">Enter your email to receive a reset link.</p>
    </div>

    <form method="post" novalidate style="text-align:left;">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="auth-btn" type="submit">Send Reset Link</button>
    </form>

    <div style="margin-top: 8px;">
      <a href="{% url 'login' %}" style="font-size: 13px;">Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
