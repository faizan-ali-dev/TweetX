{% extends "layout.html" %}

{% block sidebar %}{% endblock %}
{% block menu-button %} {% endblock %}

{% block content %}
<div class="auth-container">
  <div class="styled-auth-form" style="text-align:center;">
    <i class="fas fa-shield-halved" style="font-size: 48px; color: var(--success); margin-bottom: 16px;"></i>
    <h2 style="font-size: 22px; margin-bottom: 8px;">Password updated</h2>
    <p style="color: var(--text-secondary); font-size: 14px;">
      Your password has been set successfully. You can now sign in.
    </p>
    <a href="{% url 'login' %}" class="auth-btn" style="display:block; margin-top: 16px;">Sign In</a>
  </div>
</div>
{% endblock %}
