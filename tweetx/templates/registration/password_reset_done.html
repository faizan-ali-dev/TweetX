{% extends "layout.html" %}
{% block sidebar %}{% endblock %}
{% block menu-button %} {% endblock %}

{% block content %}
<div class="auth-container">
  <div class="styled-auth-form" style="text-align:center;">
    <i class="fas fa-check-circle" style="font-size: 48px; color: var(--success); margin-bottom: 16px;"></i>
    <h2 style="font-size: 22px; margin-bottom: 8px;">Check your email</h2>
    <p style="color: var(--text-secondary); font-size: 14px;">
      We've sent you instructions to reset your password.
    </p>
    <p style="color: var(--text-muted); font-size: 13px;">
      Please check your inbox and spam folder.
    </p>
    <a href="{% url 'login' %}" class="auth-btn" style="display:block; margin-top: 16px;">Back to Login</a>
  </div>
</div>
{% endblock %}
